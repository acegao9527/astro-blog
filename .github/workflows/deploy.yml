name: Deploy site

on:
  push:
    branches:
      - master
  repository_dispatch:
    types:
      - blog-content-updated
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Configure SSH
        env:
          BLOG_REPO_SSH_KEY: ${{ secrets.BLOG_REPO_SSH_KEY }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -eu
          if [ -z "${BLOG_REPO_SSH_KEY}" ]; then
            echo "::error::Missing BLOG_REPO_SSH_KEY secret"
            exit 1
          fi
          if [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "::error::Missing DEPLOY_SSH_KEY secret"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${BLOG_REPO_SSH_KEY}" > ~/.ssh/blog_repo_key
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/blog_repo_key ~/.ssh/deploy_key

          cat >> ~/.ssh/config <<'EOF'
          Host github.com
            HostName ssh.github.com
            Port 443
            User git
            IdentityFile ~/.ssh/blog_repo_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF

          ssh-keyscan -p 443 ssh.github.com >> ~/.ssh/known_hosts

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          BLOG_REPO_URL: git@github.com:acegao9527/blog.git
          BLOG_REPO_REF: ${{ vars.BLOG_REPO_REF }}
          SITE_URL: https://clawasync.com
        run: npm run build

      - name: Deploy site
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: /home/runner/.ssh/deploy_key
        run: npm run deploy
